set_float32_matmul_precision: high

# When true, build the model on the meta device (no real allocation/init) and
# fill every tensor directly from the checkpoint via an assign-load. This is the
# fastest path to inference but REQUIRES the checkpoint to cover 100% of the
# model's parameters and buffers — any tensor left on meta raises an error. Keep
# false for model development / training from scratch, which needs real init.
meta_init: false

trainer:
    accelerator: gpu
    devices: 1
    precision: 32
    logger: false
    enable_progress_bar: true
    strategy: auto

data:
    workers: 1

feature:
    pad_to_max_tokens: true
    pad_to_max_atoms: true
    pad_to_max_seqs: true
    min_dist: ${model.min_dist}
    max_dist: ${model.max_dist}
    num_bins: ${model.num_bins}
    atoms_per_window_queries: ${model.dims.atoms_per_window_queries}
    mask_std_feats: true

model:
    _target_: promera.model.model.PromeraModel
    disto_embed: true
    subsample_msa_per_recycle: true
    center_of_mass_loss: true
    center_of_mass_loss_weight: 1e-3
    msas_per_trunk_iter: 1024

    dims:
        atom_s: 128
        atom_z: 16
        token_s: 384
        token_z: 128
        atom_feature_dim: 389
        atoms_per_window_queries: 32
        atoms_per_window_keys: 128
    num_bins: 64

    ema: true
    val_ema: true
    ema_decay: 0.999
    min_dist: 2.0
    max_dist: 22.0

    input_embedder:
        dims: ${model.dims}
        atom_encoder_depth: 0
        atom_encoder_heads: 4
        feature: ${feature}

    msa_args:
        msa_s: 64
        msa_blocks: 4
        msa_dropout: 0.15
        z_dropout: 0.25
        pairwise_head_width: 32
        pairwise_num_heads: 4
        activation_checkpointing: true
        offload_to_cpu: false

    pairformer_args:
        dims: ${model.dims}
        num_blocks: 48
        num_heads: 16
        dropout: 0.25
        pairwise_head_width: 32
        pairwise_num_heads: 4
        activation_checkpointing: true
        offload_to_cpu: false

    has_structure_module: true
    structure_module_args:
        dims: ${model.dims}
        compile_score: false
        # Replay the diffusion score model as a CUDA graph during inference to
        # remove per-step kernel-launch overhead (big win for the launch/memory-
        # bound diffusion rollout; numerically identical to eager). See cudagraph.py.
        cudagraph_score: false
        diffusion:
            sigma_data: 16.0
        score_model_args:
            sigma_data: 16
            dim_fourier: 256
            atom_encoder_depth: 3
            atom_encoder_heads: 4
            token_transformer_depth: 24
            token_transformer_heads: 16
            atom_decoder_depth: 3
            atom_decoder_heads: 4
            conditioning_transition_layers: 2
            activation_checkpointing: true
            offload_to_cpu: false
            has_alt_update: false

    has_confidence: true
    confidence_module_args:
        dims: ${model.dims}
        num_dist_bins: 64
        max_dist: 22
        pairformer:
            dims: ${model.dims}
            num_blocks: 4
            num_heads: 16
            dropout: 0.25
            pairwise_head_width: 32
            pairwise_num_heads: 4
            activation_checkpointing: true
            offload_to_cpu: false

    has_contact_module: true
    contact_module_args:
        dims: ${model.dims}
        num_dist_bins: 64
        max_dist: 22
        pairformer:
            dims: ${model.dims}
            num_blocks: 4
            num_heads: 16
            dropout: 0.25
            pairwise_head_width: 32
            pairwise_num_heads: 4
            activation_checkpointing: true
            offload_to_cpu: false
            no_update_s: true
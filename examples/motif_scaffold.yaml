output: ./out/motifs    # outputs land in <output>/<motif name>/, e.g. out/motifs/3ixt
msa_dir:         

# designed chain spec.
design:
  chain: A                                 # the designed chain
  motif:
    reference: examples/motifs/3ixt.pdb    # source structure (.pdb or .cif) for motif seq + Cα geometry
    motif_chain: P                         # chain in the reference holding the motif
    motif_ranges: ["254-277"]              # reference numbering; multiple ranges = discontiguous motif
  scaffold:                                # X residues to infill (int = fixed, [min, max] = sampled per backbone)
    n_term: [10, 40]                       # before the first motif segment
    c_term: [10, 40]                       # after the last motif segment
    linker: [4, 8]                         # between consecutive motif segments
  total_length: [50, 75]                   # resample scaffold lengths until total length is in range

# cofolding inference (one backbone via 1 trunk + 1 diffusion sample)
recycling_steps: 4
num_backbones: 100
diffusion_steps: 200
skip_existing: true
save_traj: false
save_distogram: false
save_full_confidence: false

# sequence redesign of scaffold X positions only
inverse_folder:
  type: solublempnn    # proteinmpnn | solublempnn | ligandmpnn | abmpnn | none
  num_seqs: 1          # sequences per backbone

diffusion:
  sigma_min: 0.0004
  sigma_max: 160.0
  sigma_data: 16.0
  rho: 7
  gamma_0: 0.8
  gamma_min: 1.0
  noise_scale: 1.003
  step_scale: 1.0
  edm_churn: true
